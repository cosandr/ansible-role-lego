---

- name: Include installation tasks
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags: ["install"]
  tags: ["install"]

- name: Register previously copied hooks files
  ansible.builtin.find:
    paths: "{{ lego_home }}/deploy-hooks"
  register: __hooks_present
  when: lego_provisioning_synced
  tags: ["hooks"]

- name: Copy renew hooks
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ lego_home }}/deploy-hooks/{{ item.name }}"
    owner: root
    group: "{{ lego_group }}"
    mode: "0750"
  loop: "{{ lego_deploy_hooks }}"
  loop_control:
    label: "{{ item.name }}"
  register: __hooks_copied
  tags: ["hooks"]

- name: Ensure env dir exists
  ansible.builtin.file:
    path: "{{ lego_home }}/env.d"
    state: directory
    owner: root
    group: "{{ lego_group }}"
    mode: "0750"
  tags: ["env"]

- name: Register previously copied env files
  ansible.builtin.find:
    paths: "{{ lego_home }}/env.d"
  register: __env_present
  when: lego_provisioning_synced
  tags: ["env"]

- name: Install env files
  ansible.builtin.copy:
    dest: "{{ lego_home }}/env.d/{{ item.key }}"
    owner: root
    group: "{{ lego_group }}"
    mode: "0640"
    content: |
      {% for k, v in item.value.items() %}
      {{ k }}="{{ v }}"
      {% endfor %}
  register: __env_copied
  loop: "{{ lego_env | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: ["env"]

- name: Set list facts
  ansible.builtin.set_fact:
    __hooks_present_list: "{{ __hooks_present | json_query('files[*].path') | default([]) }}"
    __hooks_copied_list: "{{ __hooks_copied_tmp + __hooks_copied_tmp_check }}"
    __env_present_list: "{{ __env_present | json_query('files[*].path') | default([]) }}"
    __env_copied_list: "{{ __env_copied_tmp + __env_copied_tmp_check }}"
  vars:
    __hooks_copied_tmp: "{{ __hooks_copied.results | json_query('[*].dest') | default([]) }}"
    __hooks_copied_tmp_check: "{{ __hooks_copied.results | json_query('[*].invocation.dest') | default([]) }}"
    __env_copied_tmp: "{{ __env_copied.results | json_query('[*].dest') | default([]) }}"
    __env_copied_tmp_check: "{{ __env_copied.results | json_query('[*].invocation.dest') | default([]) }}"
  when: lego_provisioning_synced
  tags: ["hooks"]

- name: Remove configs not present on deployer machine (synchronize)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ (__hooks_present_list | difference(__hooks_copied_list)) + (__env_present_list | difference(__env_copied_list)) }}"
  when: lego_provisioning_synced
  tags: ["hooks"]

- name: Copy config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ lego_home }}/.lego.yml"
    owner: root
    group: "{{ lego_group }}"
    mode: "0640"
  tags: ["config"]

# [
#   {
