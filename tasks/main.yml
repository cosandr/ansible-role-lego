#   }
# ]

- name: Check existing certificates
  become: true
  become_user: "{{ lego_user }}"
  check_mode: false
  changed_when: false
  ansible.builtin.command:
    cmd: /usr/local/bin/lego certificates list --json
  environment:
    LEGO_PATH: "{{ lego_home }}"
  register: __lego_list
  tags: ["certs"]

- name: Set fact for missing domains
  ansible.builtin.set_fact:
    __lego_missing_domains: "{{ (lego_certificates.values() | map(attribute='domains') | flatten | sort) | difference((lego_list | map(attribute='domains') | flatten | sort)) }}" # noqa yaml[line-length]
  vars:
    lego_list: "{{ __lego_list.stdout | from_json }}"
  tags: ["certs"]

- name: Get certificates
  become: true
  become_user: "{{ lego_user }}"
  ansible.builtin.command:
    cmd: /usr/local/bin/lego
  environment:
    LEGO_PATH: "{{ lego_home }}"
  register: __output
  changed_when: "'The server validated our request' in __output.stderr"
  # For some reason initial request fails
  until: __output.rc == 0
  delay: 5
  retries: 1
  when: __lego_missing_domains | length > 0
  tags: ["certs", "molecule-notest"]
